        body {

            color: white;

        }

        h1 {

        }

        .menu {
            display: flex;

            gap: 40px;

        }

        /* Les cartes */
        .card {
            background-color: #808080;
            border-radius: 15px;
            padding: 40px 30px;
            width: 200px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        /* Animation “pulse” quand on survole */
        .card:hover {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 5px rgba(255,165,0,0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,165,0,0.8); }
            100% { transform: scale(1); box-shadow: 0 0 5px rgba(255,165,0,0.6); }
        }

        .card h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #ff9800;
        }

        .card a {
            display: block;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            background-color: #ff9800;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card a:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(255,165,0,0.6);
        }
