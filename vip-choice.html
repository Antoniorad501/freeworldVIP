<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>VIP FREEWORLD - Choisir</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #121212);
            color: white;
            text-align: center;
            padding: 50px 20px;
            position: relative;
            min-height: 100vh;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 40px;
        }

        .menu {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* Cartes des menus */
        .card {
            background-color: #222;
            border-radius: 15px;
            padding: 40px 30px;
            width: 220px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 5px rgba(255,165,0,0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,165,0,0.8); }
            100% { transform: scale(1); box-shadow: 0 0 5px rgba(255,165,0,0.6); }
        }

        .card h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #ff9800;
        }

        /* Liens internes avec couleurs par type */
        .card a {
            display: block;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .premium { background-color: #D3D3D3; }
        .gold { background-color: #FFD700; }
        .diamond { background-color: #b9f2ff; color: #000; }

        .premium:hover { box-shadow: 0 5px 15px rgba(255,165,0,0.6); transform: scale(1.1); }
        .gold:hover { box-shadow: 0 5px 15px rgba(0,191,255,0.6); transform: scale(1.1); }
        .diamond:hover { box-shadow: 0 5px 15px rgba(185,242,255,0.6); transform: scale(1.1); }

        /* Boutons fixes en bas */
        .bottom-btn {
            position: fixed;
            bottom: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .bottom-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(255,165,0,0.6);
        }

        .btn-retour {
            left: 20px;
            background-color: #ff0000; /* rouge */
        }

        .btn-payment {
            right: 20px;
            background-color: #25D366; /* vert */
        }
    </style>
</head>
<body>
